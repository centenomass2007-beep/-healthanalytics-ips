<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HealthAnalytics IPS{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="d-flex" id="wrapper">

  <!-- Sidebar -->
  <nav class="sidebar bg-dark d-flex flex-column" style="min-width:240px;min-height:100vh;">
    <div class="p-3 border-bottom border-secondary">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-heart-pulse-fill text-danger fs-4"></i>
        <div>
          <div class="fw-bold text-white small">HealthAnalytics</div>
          <div class="text-muted" style="font-size:11px">IPS Platform</div>
        </div>
      </div>
    </div>
    <ul class="nav flex-column p-2 mt-1 flex-grow-1">
      <li class="nav-item">
        <a href="/" class="nav-link text-white-50 {% block nav_dashboard %}{% endblock %} hover-white">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a href="/pacientes/" class="nav-link text-white-50 {% block nav_pacientes %}{% endblock %}">
          <i class="bi bi-people me-2"></i>Pacientes
        </a>
      </li>
      <li class="nav-item">
        <a href="/etl/" class="nav-link text-white-50 {% block nav_etl %}{% endblock %}">
          <i class="bi bi-arrow-left-right me-2"></i>Proceso ETL
        </a>
      </li>
      <li class="nav-item">
        <a href="/ml/" class="nav-link text-white-50 {% block nav_ml %}{% endblock %}">
          <i class="bi bi-cpu me-2"></i>Machine Learning
        </a>
      </li>
      <li class="nav-item mt-auto">
        <div class="border-top border-secondary pt-2 mt-3">
          <a href="#" onclick="descargarArchivo('/api/reportes/csv/', 'pacientes.csv')" class="nav-link text-white-50">
            <i class="bi bi-filetype-csv me-2"></i>Exportar CSV
          </a>
          <a href="#" onclick="descargarArchivo('/api/reportes/excel/', 'reporte_pacientes.xlsx')" class="nav-link text-white-50">
            <i class="bi bi-file-earmark-excel me-2"></i>Exportar Excel
          </a>
          <a href="#" onclick="descargarArchivo('/api/reportes/pdf/', 'reporte_analitica_clinica.pdf')" class="nav-link text-white-50">
            <i class="bi bi-file-earmark-pdf me-2"></i>Exportar PDF
          </a>
        </div>
      </li>
    </ul>
    <div class="p-3 border-top border-secondary">
      <div class="d-flex align-items-center justify-content-between">
        <small class="text-muted" id="usuario-nombre">—</small>
        <button class="btn btn-sm btn-outline-danger" onclick="cerrarSesion()" title="Salir">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Contenido -->
  <div class="flex-grow-1 d-flex flex-column" style="min-height:100vh;background:#f4f6fb;">
    <header class="bg-white border-bottom px-4 py-2 d-flex align-items-center justify-content-between">
      <h5 class="mb-0 fw-semibold">{% block page_title %}Dashboard{% endblock %}</h5>
      <span class="badge bg-success-subtle text-success border border-success-subtle">
        <i class="bi bi-circle-fill me-1" style="font-size:7px"></i>Sistema Activo
      </span>
    </header>
    <main class="p-4 flex-grow-1">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="{% static 'js/auth.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
