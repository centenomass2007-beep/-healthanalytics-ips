<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HealthAnalytics IPS</title>
  {% load static %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height:100vh; }
    .login-card { border-radius:16px; border:0; box-shadow:0 20px 60px rgba(0,0,0,.4); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container" style="max-width:420px">
  <div class="text-center mb-4">
    <i class="bi bi-heart-pulse-fill text-danger fs-1"></i>
    <h4 class="text-white fw-bold mt-2">HealthAnalytics IPS</h4>
    <p class="text-white-50 small">Plataforma de Analítica Clínica Inteligente</p>
  </div>
  <div class="card login-card">
    <div class="card-body p-4">
      <h5 class="fw-bold mb-4">Iniciar Sesión</h5>
      <div id="error-msg" class="alert alert-danger d-none"></div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" placeholder="Nombre de usuario"
                 onkeydown="if(event.key==='Enter') login()">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="Contraseña"
                 onkeydown="if(event.key==='Enter') login()">
          <button class="btn btn-outline-secondary" type="button"
                  onclick="togglePass()"><i class="bi bi-eye" id="eye-icon"></i></button>
        </div>
      </div>
      <button class="btn btn-primary w-100 py-2" onclick="login()" id="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </div>
  </div>
  <p class="text-center text-white-50 small mt-3">
    © 2025 HealthAnalytics IPS · Todos los derechos reservados
  </p>
</div>

<script>
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('error-msg');
  if (!username || !password) {
    err.textContent = 'Ingresa usuario y contraseña.'; err.classList.remove('d-none'); return;
  }
  btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Ingresando...';
  try {
    const res = await fetch('/api/auth/login/', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('access', data.access);
      localStorage.setItem('refresh', data.refresh);
      localStorage.setItem('username', data.username || username);
      localStorage.setItem('rol', data.rol || '');
      window.location.href = '/';
    } else {
      err.textContent = data.detail || 'Credenciales inválidas.'; err.classList.remove('d-none');
      btn.disabled = false; btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Ingresar';
    }
  } catch(e) {
    err.textContent = 'Error de conexión con el servidor.'; err.classList.remove('d-none');
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Ingresar';
  }
}
function togglePass() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eye-icon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  icon.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
