services:
  - type: web
    name: healthanalytics-ips
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: healthanalytics-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: healthanalytics-db
    databaseName: healthanalytics_db
    plan: free
